name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Create tarball
        run: |
          cd target/release
          tar czf axcli-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz axcli
          shasum -a 256 axcli-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz > axcli-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz.sha256

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/axcli-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
            target/release/axcli-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz.sha256
          generate_release_notes: true
